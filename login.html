<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FertiSene Analytics Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', sans-serif;
            overflow: hidden;
            position: relative;
            flex-direction: column;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            opacity: 0.1; /* Faded effect */
            z-index: 1;
        }
        .login-box {
            position: relative;
            padding: 20px;
            width: 300px;
            background: rgba(230, 230, 230, 0.5);
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
            opacity: 0;
            animation: fadeIn 2s ease-in 2.5s forwards;
            z-index: 2;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #f5f5f5;
            font-size: 1rem;
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: #007aff;
            color: white;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background: #005ecb;
        }
        .register-link {
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .register-link a {
            color: #007aff;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .copyright {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            color: #888;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="FertiSene Logo" class="logo">
    <div class="container">
        <div class="login-box">
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="login-btn">Login</button>
            <div class="register-link">New user? <a href="#">Create an account</a></div>
        </div>
    </div>
    <div class="copyright">&copy; 2025 FertiSene Analytics. All rights reserved.</div>
</body>
</html>
